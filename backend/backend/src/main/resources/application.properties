spring.application.name=backend

# =========================================================================
#  SECRETS ARE KEPT OUT OF THIS FILE
#  -----------------------------------------------------------------------
#  Real passwords (DB + Gmail) live in `application-local.properties`, which
#  is git-ignored and NOT committed. The line below loads it automatically
#  when present and silently skips it when it isn't. Anything in that local
#  file OVERRIDES the safe defaults here.
#
#  Each developer creates their own application-local.properties from
#  `application-local.properties.example`.
# =========================================================================
spring.config.import=optional:classpath:application-local.properties

# =========================================================================
#  DATABASE (MySQL)  -- override url/username/password in your local file
# =========================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/book_swap?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# =========================================================================
#  EMAIL / OTP (Gmail SMTP)
#  -----------------------------------------------------------------------
#  Leave the username/password blank here. Put your Gmail address and a
#  16-character App Password (no spaces) in application-local.properties.
#
#  dev-mode=true (the default) returns + logs the OTP so login works WITHOUT
#  any Gmail config. Set app.otp.dev-mode=false in your local file once real
#  email sending works.
# =========================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.otp.dev-mode=true
app.otp.expiry-minutes=5
